<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Märchen-Glücksrad</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fff8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 3rem;
      gap: 1.25rem;
    }
    h1 { font-size: 28px; font-weight: 600; color: #3a1a00; text-align: center; }
    .subtitle { font-size: 15px; color: #a06030; text-align: center; margin-top: -0.75rem; }

    .tabs { display: flex; background: #f0dcc8; border-radius: 12px; padding: 4px; }
    .tab-btn { background: transparent; border: none; border-radius: 9px; padding: 0.5rem 1.6rem; font-size: 15px; font-weight: 500; color: #a06030; cursor: pointer; transition: background 0.2s, color 0.2s; font-family: inherit; }
    .tab-btn.active { background: #e87a2a; color: white; }

    .wheel-wrapper {
      position: relative;
      width: 340px;
      height: 340px;
      max-width: 95vw;
    }
    #wheelCanvas {
      display: block;
      border-radius: 50%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      width: 100%;
      height: 100%;
    }
    /* The vertical selection frame - hidden until spin completes */
    #selFrame {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0px; /* set by JS */
      height: 100%;
      border-left: 3px solid #e87a2a;
      border-right: 3px solid #e87a2a;
      border-radius: 6px;
      pointer-events: none;
      z-index: 15;
      opacity: 0;
      transition: opacity 0.2s;
    }
    #selFrame.visible { opacity: 1; }
    @keyframes frame-blink {
      0%   { opacity: 1; }
      20%  { opacity: 0; }
      40%  { opacity: 1; }
      60%  { opacity: 0; }
      80%  { opacity: 1; }
      100% { opacity: 1; }
    }
    #selFrame.blink { animation: frame-blink 0.7s ease; }

    .pointer-dot { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 18px; height: 18px; background: white; border-radius: 50%; border: 3px solid #e87a2a; z-index: 20; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

    .spin-btn { background: #e87a2a; color: white; border: none; border-radius: 16px; font-size: 20px; font-weight: 600; padding: 0.85rem 2.8rem; cursor: pointer; transition: background 0.15s, transform 0.1s; font-family: inherit; box-shadow: 0 3px 12px rgba(232,122,42,0.4); }
    .spin-btn:hover { background: #d06a1a; }
    .spin-btn:active { transform: scale(0.97); }
    .spin-btn:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }

    .result-grid { display: grid; gap: 10px; width: 100%; max-width: 380px; }
    .result-grid.cols-5 { grid-template-columns: repeat(5, 1fr); }
    .result-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }

    .result-card { display: flex; flex-direction: column; align-items: center; gap: 4px; background: white; border-radius: 12px; padding: 12px 6px; border: 2px solid #f0d0b0; }
    .result-emoji { font-size: 26px; line-height: 1; }
    .result-label { font-size: 11px; color: #555; text-align: center; line-height: 1.3; font-weight: 500; }
    .result-category { font-size: 10px; color: #aaa; text-align: center; }

    .story-prompt { max-width: 380px; width: 100%; background: white; border-radius: 16px; border: 1.5px solid #f0c090; padding: 1.1rem 1.3rem; display: none; box-shadow: 0 2px 12px rgba(232,122,42,0.1); }
    .story-prompt.visible { display: block; }
    .story-label { font-size: 12px; color: #a05010; font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .story-text { font-size: 15px; color: #3a1a00; line-height: 1.65; }
  </style>
</head>
<body>

  <h1>✨ Märchen-Glücksrad</h1>
  <p class="subtitle">Dreh die Räder und erfinde deine Geschichte!</p>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchMode('beginner', this)">Beginner</button>
    <button class="tab-btn" onclick="switchMode('advanced', this)">Fortgeschritten</button>
  </div>

  <div class="wheel-wrapper">
    <canvas id="wheelCanvas" width="340" height="340"></canvas>
    <div id="selFrame"></div>
    <div class="pointer-dot"></div>
  </div>

  <button class="spin-btn" id="spinBtn" onclick="spinAll()">✨ Drehen!</button>

  <div class="result-grid cols-3" id="resultGrid"></div>

  <div class="story-prompt" id="storyPrompt">
    <div class="story-label">Eure Geschichte könnte so anfangen:</div>
    <div class="story-text" id="storyText"></div>
  </div>

<script>
const modes = {
  beginner: {
    showStory: true,
    rings: [
      { name: "Figur", color: "#F4A843", items: [
        { emoji: "👸", label: "Prinzessin" }, { emoji: "🧙", label: "Zauberer" },
        { emoji: "⚔️", label: "Ritter" }, { emoji: "🧌", label: "Riese" },
        { emoji: "🧚", label: "Fee" }, { emoji: "👑", label: "König" },
        { emoji: "🤴", label: "Prinz" }, { emoji: "👵", label: "Großmutter" },
      ]},
      { name: "Ort", color: "#E87A2A", items: [
        { emoji: "🏰", label: "Schloss" }, { emoji: "🌲", label: "Wald" },
        { emoji: "🏚️", label: "Hütte" }, { emoji: "🌾", label: "Dorf" },
        { emoji: "🌿", label: "Garten" }, { emoji: "🏔️", label: "Berg" },
        { emoji: "🌊", label: "Meer" }, { emoji: "❄️", label: "Eispalast" },
      ]},
      { name: "Tier", color: "#F4A843", items: [
        { emoji: "🐺", label: "Wolf" }, { emoji: "🐸", label: "Frosch" },
        { emoji: "🦄", label: "Einhorn" }, { emoji: "🐉", label: "Drache" },
        { emoji: "🦊", label: "Fuchs" }, { emoji: "🐻", label: "Bär" },
        { emoji: "🦁", label: "Löwe" }, { emoji: "🦋", label: "Schmetterling" },
      ]},
    ],
    buildStory(sel) {
      const [figur, ort, tier] = sel.map(s => s.label);
      const templates = [
        `Es war einmal eine ${figur}, die allein in einem ${ort} lebte. Eines Morgens klopfte ein ${tier} an ihre Tür – und bat um Hilfe...`,
        `Im großen ${ort} wohnte ein ${tier}, der sich sehr einsam fühlte. Da kam eine freundliche ${figur} vorbei und alles änderte sich...`,
        `Eine ${figur} verirrte sich im ${ort}. Zum Glück fand sie einen ${tier}, der den Weg nach Hause kannte – aber er hatte eine Bitte...`,
        `Der ${tier} im ${ort} hatte ein Geheimnis. Nur die mutige ${figur} traute sich, ihn danach zu fragen...`,
      ];
      return templates[Math.floor(Math.random() * templates.length)];
    }
  },
  advanced: {
    showStory: false,
    rings: [
      { name: "Figur", color: "#F4A843", items: [
        { emoji: "👸", label: "Prinzessin" }, { emoji: "🧙", label: "Zauberer" },
        { emoji: "⚔️", label: "Ritter" }, { emoji: "🧌", label: "Riese" },
        { emoji: "🧛", label: "Vampir" }, { emoji: "🧝", label: "Elfe" },
        { emoji: "👑", label: "König" }, { emoji: "🧟", label: "Monster" },
        { emoji: "🧜", label: "Meerjungfrau" }, { emoji: "🧚", label: "Fee" },
        { emoji: "👹", label: "Troll" }, { emoji: "🤴", label: "Prinz" },
        { emoji: "👵", label: "Großmutter" }, { emoji: "🧞", label: "Dschinn" },
        { emoji: "🎭", label: "Hexe" }, { emoji: "👺", label: "Kobold" },
      ]},
      { name: "Ort", color: "#E87A2A", items: [
        { emoji: "🏰", label: "Schloss" }, { emoji: "🌲", label: "Wald" },
        { emoji: "🏔️", label: "Berg" }, { emoji: "🌊", label: "Meer" },
        { emoji: "🏚️", label: "Hütte" }, { emoji: "🗼", label: "Turm" },
        { emoji: "🌋", label: "Höhle" }, { emoji: "🌾", label: "Dorf" },
        { emoji: "🏝️", label: "Insel" }, { emoji: "🌉", label: "Brücke" },
        { emoji: "🌿", label: "Garten" }, { emoji: "🏜️", label: "Wüste" },
        { emoji: "❄️", label: "Eispalast" }, { emoji: "🕳️", label: "Unterreich" },
        { emoji: "☁️", label: "Wolkenburg" }, { emoji: "🐚", label: "Meeresgrund" },
      ]},
      { name: "Gegenstand", color: "#F4A843", items: [
        { emoji: "🪄", label: "Zauberstab" }, { emoji: "🗡️", label: "Schwert" },
        { emoji: "🍎", label: "Apfel" }, { emoji: "🪞", label: "Spiegel" },
        { emoji: "💎", label: "Edelstein" }, { emoji: "🧪", label: "Zaubertrank" },
        { emoji: "🔑", label: "Schlüssel" }, { emoji: "📖", label: "Zauberbuch" },
        { emoji: "🪬", label: "Amulett" }, { emoji: "🎩", label: "Zauberhut" },
        { emoji: "🧲", label: "Wunschstein" }, { emoji: "🎻", label: "Geige" },
        { emoji: "🫙", label: "Fläschchen" }, { emoji: "🌹", label: "Rose" },
        { emoji: "👢", label: "Zauberstiefel" }, { emoji: "🕯️", label: "Kerze" },
      ]},
      { name: "Tier", color: "#E87A2A", items: [
        { emoji: "🐺", label: "Wolf" }, { emoji: "🐸", label: "Frosch" },
        { emoji: "🦄", label: "Einhorn" }, { emoji: "🐉", label: "Drache" },
        { emoji: "🦊", label: "Fuchs" }, { emoji: "🦅", label: "Adler" },
        { emoji: "🐻", label: "Bär" }, { emoji: "🦁", label: "Löwe" },
        { emoji: "🐦", label: "Rabe" }, { emoji: "🦋", label: "Schmetterling" },
        { emoji: "🐴", label: "Pferd" }, { emoji: "🦢", label: "Schwan" },
        { emoji: "🐊", label: "Krokodil" }, { emoji: "🦔", label: "Igel" },
        { emoji: "🐈", label: "Katze" }, { emoji: "🦌", label: "Hirsch" },
      ]},
      { name: "Aufgabe", color: "#F4A843", items: [
        { emoji: "🔓", label: "Befreiung" }, { emoji: "🧩", label: "Rätsel" },
        { emoji: "💫", label: "Fluch" }, { emoji: "🗺️", label: "Suche" },
        { emoji: "🔮", label: "Verwandlung" }, { emoji: "💔", label: "Liebe" },
        { emoji: "🏆", label: "Wettkampf" }, { emoji: "🌙", label: "Prophezeiung" },
        { emoji: "🛡️", label: "Schutz" }, { emoji: "🌱", label: "Heilung" },
        { emoji: "👻", label: "Geisterjagd" }, { emoji: "🌈", label: "Wunsch" },
        { emoji: "⚖️", label: "Gerechtigkeit" }, { emoji: "🤝", label: "Freundschaft" },
        { emoji: "🏃", label: "Flucht" }, { emoji: "🎁", label: "Geschenk" },
      ]},
    ],
    buildStory() { return ""; }
  }
};

const SIZE = 340;
const cx = SIZE / 2, cy = SIZE / 2;
// Equal band widths: outermost radius = 155, divided equally
const OUTER = 155;

let currentMode = 'beginner';
let angles = [0, 0, 0, 0, 0];
let spinning = false;

function getRings() { return modes[currentMode].rings; }

function getRadii(n) {
  // Each ring has equal band width = OUTER / n
  const bw = OUTER / n;
  return Array.from({length: n}, (_, i) => OUTER - i * bw);
}

// Width in canvas-pixels of one angular segment at the outermost ring at the top
// We use the chord width at the top of the outermost ring for a given slice angle
function getSegmentWidth(n) {
  const sliceAngle = (2 * Math.PI) / n;
  // chord at outerRadius for sliceAngle
  return 2 * OUTER * Math.sin(sliceAngle / 2);
}

function drawWheel() {
  const canvas = document.getElementById('wheelCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, SIZE, SIZE);
  const rings = getRings();
  const n = rings.length;
  const radii = getRadii(n);
  const bw = OUTER / n;

  for (let r = 0; r < n; r++) {
    const outerR = radii[r];
    const innerR = r < n - 1 ? radii[r + 1] : 0;
    const items = rings[r].items;
    const count = items.length;
    const sliceAngle = (2 * Math.PI) / count;
    const offset = angles[r];

    for (let i = 0; i < count; i++) {
      const startA = offset + i * sliceAngle - Math.PI / 2;
      const endA = startA + sliceAngle;
      const midA = (startA + endA) / 2;

      ctx.beginPath();
      ctx.moveTo(cx + innerR * Math.cos(startA), cy + innerR * Math.sin(startA));
      ctx.arc(cx, cy, outerR, startA, endA);
      if (innerR > 0) { ctx.arc(cx, cy, innerR, endA, startA, true); } else { ctx.lineTo(cx, cy); }
      ctx.closePath();

      ctx.fillStyle = i % 2 === 0 ? rings[r].color : "#FFFFFF";
      ctx.fill();
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 1.5;
      ctx.stroke();

      const emojiR = innerR + (outerR - innerR) / 2;
      const ex = cx + emojiR * Math.cos(midA);
      const ey = cy + emojiR * Math.sin(midA);
      const fontSize = Math.max(9, Math.round(bw * 0.60));
      ctx.font = fontSize + "px serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(items[i].emoji, ex, ey);
    }
  }

  // center dot
  ctx.beginPath();
  ctx.arc(cx, cy, 9, 0, 2 * Math.PI);
  ctx.fillStyle = "#e87a2a";
  ctx.fill();
}

// Snap each ring so the chosen item sits exactly at top (angle 0 = top)
// chosen index is random; snap = rotate so that item midpoint = top (π/2 offset)
function snapAngles(chosenIndices) {
  const rings = getRings();
  rings.forEach((ring, r) => {
    const n = ring.items.length;
    const sliceAngle = (2 * Math.PI) / n;
    const idx = chosenIndices[r];
    // We want: offset + idx * sliceAngle + sliceAngle/2 = π/2 (top center)
    // => offset = π/2 - idx * sliceAngle - sliceAngle/2
    angles[r] = Math.PI / 2 - idx * sliceAngle - sliceAngle / 2;
  });
}

function getSelected() {
  const rings = getRings();
  return rings.map((ring, r) => {
    const n = ring.items.length;
    const sliceAngle = (2 * Math.PI) / n;
    let a = (-(angles[r]) + Math.PI / 2 + sliceAngle / 2) % (2 * Math.PI);
    if (a < 0) a += 2 * Math.PI;
    return ring.items[Math.floor(a / sliceAngle) % n];
  });
}

function buildResultGrid() {
  const rings = getRings();
  const n = rings.length;
  const grid = document.getElementById('resultGrid');
  grid.className = 'result-grid cols-' + n;
  grid.innerHTML = rings.map((ring, i) =>
    `<div class="result-card" id="rc${i}">
      <div class="result-emoji">?</div>
      <div class="result-label">—</div>
      <div class="result-category">${ring.name}</div>
    </div>`
  ).join('');
}

function updateCards(selected) {
  selected.forEach((item, i) => {
    const card = document.getElementById('rc' + i);
    if (!card) return;
    card.querySelector('.result-emoji').textContent = item.emoji;
    card.querySelector('.result-label').textContent = item.label;
  });
}

function showFrame() {
  const rings = getRings();
  const n = rings.length;
  // use outermost ring's slice angle for frame width
  const outerCount = rings[0].items.length;
  const sliceAngle = (2 * Math.PI) / outerCount;
  // chord width at OUTER radius for this slice
  const chordW = 2 * OUTER * Math.sin(sliceAngle / 2);
  // canvas is displayed at SIZE px, canvas coords = display coords (1:1)
  const frame = document.getElementById('selFrame');
  frame.style.width = Math.round(chordW) + 'px';
  frame.classList.remove('blink');
  frame.classList.add('visible');
  void frame.offsetWidth;
  frame.classList.add('blink');
}

function hideFrame() {
  const frame = document.getElementById('selFrame');
  frame.classList.remove('visible', 'blink');
}

function switchMode(mode, btn) {
  currentMode = mode;
  angles = [0, 0, 0, 0, 0];
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('storyPrompt').classList.remove('visible');
  hideFrame();
  buildResultGrid();
  drawWheel();
}

function spinAll() {
  if (spinning) return;
  spinning = true;
  hideFrame();
  const rings = getRings();
  const btn = document.getElementById('spinBtn');
  btn.disabled = true;
  btn.textContent = "🌀 Dreht sich...";
  document.getElementById('storyPrompt').classList.remove('visible');

  // Choose random target indices now
  const chosenIndices = rings.map(ring => Math.floor(Math.random() * ring.items.length));

  // Each ring spins several full rotations + lands on chosen index
  const fullSpins = rings.map(() => (3 + Math.floor(Math.random() * 4)) * 2 * Math.PI);
  const startAngles = angles.slice(0, rings.length);

  // Compute final snap angle for each ring
  const finalAngles = rings.map((ring, r) => {
    const n = ring.items.length;
    const sliceAngle = (2 * Math.PI) / n;
    return Math.PI / 2 - chosenIndices[r] * sliceAngle - sliceAngle / 2;
  });

  // We animate from startAngle to finalAngle + fullSpins
  // Use modular arithmetic: animate forward by fullSpins, land on finalAngle
  const deltaAngles = rings.map((ring, r) => {
    // how much to add to startAngles[r] to reach finalAngles[r] after fullSpins
    let diff = (finalAngles[r] - startAngles[r]) % (2 * Math.PI);
    // normalize diff to [0, 2π]
    if (diff < 0) diff += 2 * Math.PI;
    return fullSpins[r] + diff;
  });

  const duration = 3000;
  const start = performance.now();

  function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

  function frame(now) {
    const t = Math.min((now - start) / duration, 1);
    const eased = easeOut(t);
    for (let r = 0; r < rings.length; r++) {
      angles[r] = startAngles[r] + deltaAngles[r] * eased;
    }
    drawWheel();
    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      // Snap precisely
      rings.forEach((ring, r) => { angles[r] = finalAngles[r]; });
      drawWheel();
      spinning = false;
      btn.disabled = false;
      btn.textContent = "✨ Nochmal drehen!";

      const selected = chosenIndices.map((idx, r) => rings[r].items[idx]);
      updateCards(selected);
      showFrame();

      const mode = modes[currentMode];
      if (mode.showStory) {
        document.getElementById('storyText').textContent = mode.buildStory(selected);
        document.getElementById('storyPrompt').classList.add('visible');
      }
    }
  }
  requestAnimationFrame(frame);
}

buildResultGrid();
drawWheel();
</script>
</body>
</html>
